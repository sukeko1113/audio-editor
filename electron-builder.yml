appId: com.sukeko.audioeditor
productName: AudioEditor
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# ffmpeg / ffprobe バイナリは asar 内から実行できないため展開する
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
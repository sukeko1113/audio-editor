appId: com.example.audioeditor
productName: 音声編集アプリ
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# ffmpeg / ffprobe バイナリは asar 内から実行できないため展開する
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

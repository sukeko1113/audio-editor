<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; media-src 'self' app-audio:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音声編集アプリ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <button id="open-file-btn" class="btn-primary">ファイルを開く</button>
        <span id="status" class="status"></span>
      </header>

      <main class="content">
        <div id="waveform" class="waveform"></div>

        <section id="transport" class="transport" hidden>
          <button id="play-btn" class="btn">再生</button>
          <button id="pause-btn" class="btn" disabled>一時停止</button>
          <button id="stop-btn" class="btn" disabled>停止</button>
          <span id="time" class="time">0:00.0 / 0:00.0</span>
        </section>

        <section id="edit-tools" class="edit-tools" hidden>
          <p class="edit-hint">
            波形上をドラッグして範囲を選択（複数可）。範囲をクリックで選択、端をドラッグで微調整できます。
          </p>
          <div class="edit-actions">
            <span id="region-count" class="region-count">選択範囲: 0</span>
            <button id="delete-region-btn" class="btn" disabled>選択範囲を削除</button>
            <button id="clear-regions-btn" class="btn" disabled>すべて解除</button>
            <button id="cut-btn" class="btn btn-danger" disabled>カット</button>
            <button id="save-btn" class="btn btn-primary" disabled>保存</button>
          </div>

          <p class="edit-hint">
            音量調整：範囲が選択されていればその範囲のみ、なければ音声全体に適用します。
          </p>
          <div class="edit-actions volume-actions">
            <span class="volume-label">音量</span>
            <input
              id="volume-input"
              class="volume-input"
              type="number"
              min="0"
              max="1000"
              step="10"
              value="100"
              disabled
            />
            <span class="volume-unit">%</span>
            <button id="volume-apply-btn" class="btn" disabled>音量を適用</button>
            <span class="volume-presets-label">プリセット:</span>
            <button id="volume-down-btn" class="btn" disabled>-50%</button>
            <button id="volume-up-btn" class="btn" disabled>+50%</button>
            <button id="volume-double-btn" class="btn" disabled>2倍</button>
            <button id="volume-mute-btn" class="btn" disabled>ミュート</button>
          </div>
        </section>

        <p id="placeholder" class="placeholder">
          「ファイルを開く」から MP3 / WAV / M4A ファイルを選択してください。
        </p>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>

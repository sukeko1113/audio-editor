<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; media-src 'self' app-audio:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音声編集アプリ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <button id="open-file-btn" class="btn-primary">ファイルを開く</button>
        <span id="status" class="status"></span>
      </header>

      <main class="content">
        <div id="waveform" class="waveform"></div>

        <section id="transport" class="transport" hidden>
          <button id="play-btn" class="btn">再生</button>
          <button id="pause-btn" class="btn" disabled>一時停止</button>
          <button id="stop-btn" class="btn" disabled>停止</button>
          <span id="time" class="time">0:00.0 / 0:00.0</span>
        </section>

        <p id="placeholder" class="placeholder">
          「ファイルを開く」から MP3 / WAV / M4A ファイルを選択してください。
        </p>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
